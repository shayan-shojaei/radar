name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            GOOS: linux
            GOARCH: amd64
          - os: ubuntu-latest
            GOOS: linux
            GOARCH: arm64
          - os: macos-latest
            GOOS: darwin
            GOARCH: amd64
          - os: macos-latest
            GOOS: darwin
            GOARCH: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.GOOS }}
          GOARCH: ${{ matrix.GOARCH }}
          CGO_ENABLED: "0"
        run: |
          TAG=${GITHUB_REF_NAME}
          go build \
            -ldflags="-s -w -X main.version=${TAG}" \
            -o radar-${{ matrix.GOOS }}-${{ matrix.GOARCH }} \
            ./cmd/radar

      - uses: softprops/action-gh-release@v2
        with:
          files: radar-${{ matrix.GOOS }}-${{ matrix.GOARCH }}
